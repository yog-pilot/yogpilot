<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YogPilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">Y</div>
          <div>
            <h1>YogPilot</h1>
            <p>AI chat companion</p>
          </div>
        </div>
        <div class="sidebar-card">
          <h2>How it works</h2>
          <p>Ask a question, send it to the backend, and get an AI-generated response.</p>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Smart conversation</p>
            <h2>Ask YogPilot anything</h2>
          </div>
        </header>

        <section id="chatMessages" class="chat-messages">
          <div class="message ai">
            <div class="avatar">AI</div>
            <div class="bubble">
              <p>Hello! I’m YogPilot. Ask me a question and I’ll do my best to help.</p>
            </div>
          </div>
        </section>

        <form id="chatForm" class="chat-input-area">
          <textarea
            id="messageInput"
            rows="1"
            placeholder="Type your message here..."
            aria-label="Type your message"
            required
          ></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </main>
    </div>

    <template id="messageTemplate">
      <div class="message">
        <div class="avatar"></div>
        <div class="bubble">
          <p></p>
        </div>
      </div>
    </template>

    <script src="script.js"></script>
  </body>
  </html>
